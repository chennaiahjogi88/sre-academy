apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: '/etc/alertmanager/secrets/slack-webhook-url'

    route:
      group_by: ['alertname', 'severity', 'cluster']
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 4h
      receiver: 'slack-sre-team'
      routes:
        - matchers:
            - severity="critical"
          receiver: 'slack-oncall-critical'
          group_wait: 5s
          repeat_interval: 30m
          continue: true
        - matchers:
            - severity="info"
          receiver: 'null'
        - receiver: 'slack-debug'

    receivers:
      - name: 'slack-sre-team'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}][{{ "{{" }} .GroupLabels.severity {{ "}}" }}] {{ "{{" }} .GroupLabels.alertname {{ "}}" }} — ktech-sre'
            text: |
              {{ "{{" }} range .Alerts {{ "}}" }}*Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
              *Labels:* {{ "{{" }} range .Labels.SortedPairs {{ "}}" }}`{{ "{{" }} .Name {{ "}}" }}={{ "{{" }} .Value {{ "}}" }}` {{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}

      - name: 'slack-oncall-critical'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            color: 'danger'
            title: ':fire: [CRITICAL] {{ "{{" }} .GroupLabels.alertname {{ "}}" }} — ktech-sre — ACTION REQUIRED'
            text: |
              {{ "{{" }} range .Alerts {{ "}}" }}*Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
              *Labels:* {{ "{{" }} range .Labels.SortedPairs {{ "}}" }}`{{ "{{" }} .Name {{ "}}" }}={{ "{{" }} .Value {{ "}}" }}` {{ "{{" }} end {{ "}}" }}
              *Started:* {{ "{{" }} .StartsAt {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}

      - name: 'slack-debug'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}][{{ "{{" }} .GroupLabels.severity {{ "}}" }}] {{ "{{" }} .GroupLabels.alertname {{ "}}" }} — ktech-sre'
            text: |
              {{ "{{" }} range .Alerts {{ "}}" }}*Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} end {{ "}}" }}

      - name: 'null'

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname']
