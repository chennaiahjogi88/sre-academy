  name: sre-platform-secrets
  namespace: sre-platform
type: Opaque
stringData:
  JWT_SECRET: "change_this_in_production"
  POSTGRES_PASSWORD: "sre_password_2024"
  PGPASSWORD: "sre_password_2024"
  GRAFANA_PASSWORD: "Grafana@123"
