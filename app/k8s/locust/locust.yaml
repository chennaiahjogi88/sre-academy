# ── Locust load testing for SRE Platform ──────────────────────────────────────
# Deploys a master + 2 workers in sre-platform namespace
# Access the Locust UI to start/stop tests and watch live metrics
#
# Usage:
#   kubectl port-forward svc/locust-service 8089:8089 -n sre-platform
#   Then open http://localhost:8089
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-scripts
  namespace: sre-platform
data:
  locustfile.py: |
    from locust import HttpUser, task, between, events
    import random
    import string
    import io

    CLASS_IDS = [
        "sre_foundations_1", "sre_foundations_2", "docker_fundamentals",
        "k8s_basics", "k8s_architecture", "prometheus", "grafana", "loki",
        "jaeger", "alertmanager", "load_testing"
    ]

    def _random_email():
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=8))
        return f"loadtest_{suffix}@ktech.sre"

    class SREPlatformStudent(HttpUser):
        """Simulates a student browsing the SRE Academy platform."""
        wait_time = between(1, 4)
        token = None
        recording_filenames = []

        def on_start(self):
            resp = self.client.post(
                "/api/auth/login",
                json={"email": "student@ktech.sre", "password": "Student@123"},
                name="POST /api/auth/login"
            )
            if resp.status_code == 200:
                self.token = resp.json().get("token")
            # cache filenames for stream tasks
            r = self.client.get("/api/recordings", headers=self._headers(), name="GET /api/recordings")
            if r.status_code == 200:
                self.recording_filenames = [rec["filename"] for rec in r.json() if rec.get("filename")]

        def _headers(self):
            return {"Authorization": f"Bearer {self.token}"} if self.token else {}

        @task(8)
        def browse_classes(self):
            self.client.get("/api/classes", headers=self._headers(), name="GET /api/classes")

        @task(5)
        def view_announcements(self):
            self.client.get(
                "/api/announcements", headers=self._headers(), name="GET /api/announcements"
            )

        @task(4)
        def list_recordings(self):
            self.client.get(
                "/api/recordings", headers=self._headers(), name="GET /api/recordings"
            )

        @task(6)
        def health_check(self):
            self.client.get("/health", name="GET /health")

        @task(2)
        def auth_me(self):
            self.client.get("/api/auth/me", headers=self._headers(), name="GET /api/auth/me")

        @task(1)
        def failed_login(self):
            """Generates login_attempts_total{result="failure"} — triggers the alert."""
            self.client.post(
                "/api/auth/login",
                json={"email": "attacker@evil.com", "password": "wrongpassword"},
                name="POST /api/auth/login [fail]"
            )

        # ── Spans added below ──────────────────────────────────────────────────

        @task(1)
        def register_user(self):
            """Triggers bcrypt.hash span via POST /api/auth/register."""
            self.client.post(
                "/api/auth/register",
                json={"name": "Load Test User", "email": _random_email(), "password": "Test@1234"},
                name="POST /api/auth/register"
            )

        @task(3)
        def update_progress(self):
            """Triggers class.update_progress span via PUT /api/classes/:id/progress."""
            class_id = random.choice(CLASS_IDS)
            current_slide = random.randint(1, 19)
            self.client.put(
                f"/api/classes/{class_id}/progress",
                json={"current_slide": current_slide, "total_slides": 20, "completed": current_slide == 19},
                headers=self._headers(),
                name="PUT /api/classes/:id/progress"
            )

        @task(2)
        def stream_recording(self):
            """Triggers recording.stream span via GET /api/recordings/stream/:filename."""
            if not self.recording_filenames:
                return
            filename = random.choice(self.recording_filenames)
            self.client.get(
                f"/api/recordings/stream/{filename}",
                headers={**self._headers(), "Range": "bytes=0-65535"},
                name="GET /api/recordings/stream/:filename"
            )

    class SREPlatformAdmin(HttpUser):
        """Simulates admin operations — lower frequency."""
        wait_time = between(5, 15)
        token = None

        def on_start(self):
            resp = self.client.post(
                "/api/auth/login",
                json={"email": "admin@ktech.sre", "password": "Admin@123"},
                name="POST /api/auth/login [admin]"
            )
            if resp.status_code == 200:
                self.token = resp.json().get("token")

        def _headers(self):
            return {"Authorization": f"Bearer {self.token}"} if self.token else {}

        @task(3)
        def list_users(self):
            self.client.get("/api/admin/users", headers=self._headers(), name="GET /api/admin/users")

        @task(1)
        def check_health(self):
            self.client.get("/health", name="GET /health [admin]")

        @task(1)
        def upload_recording(self):
            """Triggers recording.upload span via POST /api/recordings/upload."""
            fake_video = io.BytesIO(b"\x00" * 1024)
            self.client.post(
                "/api/recordings/upload",
                files={"recording": ("loadtest.mp4", fake_video, "video/mp4")},
                data={"class_id": random.choice(CLASS_IDS), "title": "Load Test Recording"},
                headers=self._headers(),
                name="POST /api/recordings/upload"
            )

    # Ratio: mostly students
    # NOTE: ws.slide_progress and ws.send_announcement (Socket.IO) require
    # python-socketio in the image and cannot be triggered via HTTP tasks.
    SREPlatformStudent.weight = 10
    SREPlatformAdmin.weight = 1
---
# ── Locust Master ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: sre-platform
  labels:
    app: locust
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      role: master
  template:
    metadata:
      labels:
        app: locust
        role: master
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.24.0
          command:
            - locust
            - -f
            - /locust/locustfile.py
            - --master
            - --host=http://backend-service:3001
            - --web-port=8089
          ports:
            - name: web
              containerPort: 8089
            - name: worker-p1
              containerPort: 5557
            - name: worker-p2
              containerPort: 5558
          volumeMounts:
            - name: locust-scripts
              mountPath: /locust
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts
---
# ── Locust Workers ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: sre-platform
  labels:
    app: locust
    role: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust
      role: worker
  template:
    metadata:
      labels:
        app: locust
        role: worker
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.24.0
          command:
            - locust
            - -f
            - /locust/locustfile.py
            - --worker
            - --master-host=locust-master-service
          volumeMounts:
            - name: locust-scripts
              mountPath: /locust
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: locust-master-service
  namespace: sre-platform
spec:
  selector:
    app: locust
    role: master
  ports:
    - name: web
      port: 8089
      targetPort: 8089
    - name: worker-p1
      port: 5557
      targetPort: 5557
    - name: worker-p2
      port: 5558
      targetPort: 5558
