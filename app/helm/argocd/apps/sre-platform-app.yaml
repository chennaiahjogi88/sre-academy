apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ktech-sre-academy
spec:
  project: ktech-sre
  source:
    repoURL: https://github.com/myproject-vs/ktech-sre-academy.git
    targetRevision: helm
    path: app/helm/sre-platform
    helm:
      valueFiles:
        # Switch to values-eks.yaml for EKS deployments
        - values-minikube.yaml
      # Override secrets at deploy time:
      # parameters:
      #   - name: secrets.jwtSecret
      #     value: <your-jwt-secret>
      #   - name: secrets.postgresPassword
      #     value: <your-pg-password>
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
