apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-service:9090
        isDefault: true
        access: proxy
        editable: true
        jsonData:
          timeInterval: "15s"

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-service:3100
        access: proxy
        editable: true
        jsonData:
          maxLines: 1000

      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger-service:16686
        access: proxy
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: sre-platform
        folder: SRE Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
