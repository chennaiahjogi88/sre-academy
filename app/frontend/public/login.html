<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ktech SRE Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #060d1a 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .card {
            background: #0a1628;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
            text-align: left;
        }

        .logo-text .brand-main {
            font-size: 28px;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .logo-text .brand-sub {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .btn-login {
            width: 100%;
            padding: 12px 16px;
            background: #38bdf8;
            color: #0a1628;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        .btn-login:hover:not(:disabled) {
            background: #0ea5e9;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-login.loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-left: 8px;
            border: 2px solid rgba(10, 22, 40, 0.3);
            border-top-color: #0a1628;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: -2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 12px 14px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid #4ade80;
            border-radius: 8px;
            padding: 12px 14px;
            color: #86efac;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .link-group {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #1e293b;
            text-align: center;
            font-size: 13px;
        }

        .link-group a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .link-group a:hover {
            color: #0ea5e9;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #1e293b;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .demo-section {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            font-size: 12px;
        }

        .demo-title {
            color: #38bdf8;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .demo-account {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', 'Monaco', 'Menlo', monospace;
            color: #94a3b8;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .demo-account:hover { border-color: #38bdf8; }

        .demo-account:last-child {
            margin-bottom: 0;
        }

        .demo-label {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            margin-bottom: 4px;
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .card {
                padding: 28px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
                        <line x1="18" y1="10" x2="18" y2="26" stroke="#1e293b" stroke-width="1"/>
                        <line x1="10" y1="18" x2="26" y2="18" stroke="#1e293b" stroke-width="1"/>
                        <line x1="13" y1="11" x2="13" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="13" y1="18" x2="23" y2="11" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="13" y1="18" x2="23" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <circle cx="28" cy="10" r="2.5" fill="#38bdf8" opacity="0.6"/>
                    </svg>
                    <span class="logo-text">
                        <span class="brand-main">Ktech</span>
                        <span class="brand-sub">SRE Academy</span>
                    </span>
                </div>
                <div class="subtitle">Training Platform</div>
            </div>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    Sign In
                </button>
            </form>

            <div class="link-group">
                <a href="/">← Back to Home</a>
            </div>

            <div class="divider">Demo Credentials</div>

            <div class="demo-section">
                <div class="demo-title">Admin Account</div>
                <div class="demo-account">
                    <span class="demo-label">Email:</span>
                    admin@ktech.sre
                </div>
                <div class="demo-account">
                    <span class="demo-label">Password:</span>
                    Admin@123
                </div>

                <div class="demo-title" style="margin-top: 16px;">Student Account</div>
                <div class="demo-account">
                    <span class="demo-label">Email:</span>
                    student@ktech.sre
                </div>
                <div class="demo-account">
                    <span class="demo-label">Password:</span>
                    Student@123
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        Auth.redirectIfLoggedIn();

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Signing In';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store session
                    Auth.setSession(data.token, data.user);

                    // Show success
                    successMsg.textContent = `Welcome, ${data.user.name}!`;
                    successMsg.classList.add('show');

                    // Redirect after brief delay
                    setTimeout(() => {
                        const params = new URLSearchParams(window.location.search);
                        const nextUrl = params.get('next') || '/portal.html';
                        window.location.href = nextUrl;
                    }, 800);
                } else {
                    throw new Error(data.error || data.message || 'Login failed. Check your credentials.');
                }
            } catch (error) {
                errorMsg.textContent = error.message || 'An error occurred. Please try again.';
                errorMsg.classList.add('show');

                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Sign In';

                // Clear password for security
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Demo account quick-fill
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('demo-account')) {
                const text = e.target.textContent.trim().split('\n')[1];
                if (text.includes('@')) {
                    emailInput.value = text;
                } else if (text.length > 0) {
                    passwordInput.value = text;
                }
            }
        });
    </script>
</body>
</html>
