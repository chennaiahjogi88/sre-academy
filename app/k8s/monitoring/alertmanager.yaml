# ── MailHog — fake SMTP server for local/dev alert testing ───────────────────
# Catches all emails sent by Alertmanager and shows them in a web UI.
# Web UI:  http://mailhog.ktech.io  (or kubectl port-forward svc/mailhog-service 8025)
# SMTP:    mailhog-service:1025  (no auth, no TLS)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: monitoring
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - containerPort: 1025  # SMTP
            - containerPort: 8025  # Web UI
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-service
  namespace: monitoring
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: web
      port: 8025
      targetPort: 8025
---
# ── Slack webhook URL — stored as a Secret ────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: monitoring
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.slack.com/services/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"
---
# ── Alertmanager configuration ────────────────────────────────────────────────
# Routes:
#   critical → #alerts  (group_wait 5s, repeat 30m, color: danger)
#   warning  → #alerts  (group_wait 15s, repeat 4h)
#   info     → silenced (null receiver)
# Webhook URL is mounted from Secret via slack_api_url_file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: '/etc/alertmanager/secrets/slack-webhook-url'

    route:
      group_by: ['alertname', 'severity', 'cluster']
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 4h
      receiver: 'slack-sre-team'
      routes:
        - matchers:
            - severity="critical"
          receiver: 'slack-oncall-critical'
          group_wait: 5s
          repeat_interval: 30m
          continue: true      # also fan-out to slack-debug below
        - matchers:
            - severity="info"
          receiver: 'null'
        - receiver: 'slack-debug'  # catch-all: every alert lands in #alerts

    receivers:
      - name: 'slack-sre-team'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}][{{ .GroupLabels.severity }}] {{ .GroupLabels.alertname }} — ktech-sre'
            text: |
              {{ range .Alerts }}*Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Labels:* {{ range .Labels.SortedPairs }}`{{ .Name }}={{ .Value }}` {{ end }}
              {{ end }}

      - name: 'slack-oncall-critical'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            color: 'danger'
            title: ':fire: [CRITICAL] {{ .GroupLabels.alertname }} — ktech-sre — ACTION REQUIRED'
            text: |
              {{ range .Alerts }}*Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Labels:* {{ range .Labels.SortedPairs }}`{{ .Name }}={{ .Value }}` {{ end }}
              *Started:* {{ .StartsAt }}
              {{ end }}

      - name: 'slack-debug'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}][{{ .GroupLabels.severity }}] {{ .GroupLabels.alertname }} — ktech-sre'
            text: |
              {{ range .Alerts }}*Summary:* {{ .Annotations.summary }}{{ end }}

      - name: 'null'

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname']
---
# ── Alertmanager deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://alertmanager.ktech.io'
            - '--log.level=debug'
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: slack-secret
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: slack-secret
          secret:
            secretName: alertmanager-slack-secret
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
