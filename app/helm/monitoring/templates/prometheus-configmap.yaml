apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: ktech-sre
        env: production

    rule_files:
      - /etc/prometheus/alert_rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service:9093']

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                {{- range .Values.prometheus.scrapeNamespaces }}
                - {{ . }}
                {{- end }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      - job_name: kubernetes-nodes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  alert_rules.yml: |
    groups:
      - name: sre_platform
        rules:
          - alert: HighLoginFailureRate
            expr: rate(login_attempts_total{result="failure"}[5m]) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High login failure rate detected"
              description: "More than 0.5 failed logins/sec for 2+ minutes"

          - alert: BackendDown
            expr: absent(up{job="kubernetes-pods", app="sre-backend"})
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "SRE Platform backend is down"
              description: "No healthy backend pods scraping for 30+ seconds"

          - alert: HighAPILatency
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High API latency"
              description: "95th percentile latency > 1 second"

          - alert: NoActiveUsers
            expr: active_websocket_users == 0
            for: 30m
            labels:
              severity: info
            annotations:
              summary: "No students currently active"
              description: "No WebSocket connections for 30+ minutes"

          - alert: HighErrorRate
            expr: rate(http_requests_total{status_code=~"5.."}[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Elevated 5xx error rate"
              description: "More than 0.1 server errors/sec for 2+ minutes"

          - alert: High429Rate
            expr: |
              sum by (app) (rate(http_requests_total{status_code="429"}[5m]))
                / sum by (app) (rate(http_requests_total[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Elevated 429 (Too Many Requests) rate"
              description: "More than 5% of requests returning 429 for 5+ minutes"

      - name: postgres
        rules:
          - alert: PostgresDown
            expr: pg_up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "postgres_exporter cannot reach the database"

          - alert: PostgresTooManyConnections
            expr: pg_stat_database_numbackends{datname="sre_platform"} > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Too many Postgres connections"
              description: "Active connections on sre_platform > 80 for 2+ minutes"

          - alert: PostgresDeadLocks
            expr: rate(pg_stat_database_deadlocks{datname="sre_platform"}[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Postgres deadlocks detected"
              description: "Deadlocks occurring on sre_platform database"

          - alert: PostgresSlowQueries
            expr: pg_stat_activity_max_tx_duration{datname="sre_platform"} > 60
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Postgres long-running transaction"
              description: "A transaction has been running for over 60 seconds"
