apiVersion: v1
kind: Service
metadata:
  name: locust-master-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust.labels" . | nindent 4 }}
spec:
  selector:
    app: locust-master
  ports:
    - name: web-ui
      port: 8089
      targetPort: 8089
    - name: master-p1
      port: 5557
      targetPort: 5557
    - name: master-p2
      port: 5558
      targetPort: 5558
