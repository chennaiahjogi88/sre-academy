name: Frontend CI

# Triggers on any change to frontend code or this workflow file.
# On PR: lint + docker smoke test. On push to main: also push image → update Helm tag.
on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: write   # needed to commit the Helm values update back to main

env:
  IMAGE_NAME: kotidevops/kt-frontend

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint & validate static assets
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required HTML pages exist
        run: |
          echo "Checking required HTML pages..."
          for page in index.html login.html register.html portal.html recordings.html resources.html; do
            if [ ! -f "app/frontend/public/$page" ]; then
              echo "MISSING: $page"
              exit 1
            fi
            echo "  OK: $page"
          done

      - name: Validate HTML structure
        run: |
          echo "Checking HTML structure..."
          for f in app/frontend/public/*.html; do
            grep -q "<!DOCTYPE html>" "$f" || { echo "MISSING DOCTYPE in $f"; exit 1; }
            grep -q "<title>" "$f"         || { echo "MISSING <title> in $f"; exit 1; }
            grep -q "<meta charset"        "$f" || { echo "MISSING charset meta in $f"; exit 1; }
            echo "  OK: $f"
          done

      - name: Validate nginx config syntax
        run: |
          docker run --rm \
            -v "$PWD/app/frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:1.25-alpine nginx -t
          echo "nginx config syntax OK"

  # ──────────────────────────────────────────────
  # JOB 2: Docker smoke test
  # Build the image and hit the health endpoint
  # ──────────────────────────────────────────────
  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (test tag)
        run: docker build -t frontend-test app/frontend

      - name: Run container and verify nginx health endpoint
        run: |
          docker run -d --name frontend-test -p 8080:80 frontend-test
          # Give nginx a moment to start
          sleep 3
          # Verify the /nginx-health endpoint returns 200
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/nginx-health)
          echo "Health response: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "FAILED: expected 200, got $HTTP_CODE"; exit 1; }
          # Verify index.html is served
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Index response: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "FAILED: expected 200, got $HTTP_CODE"; exit 1; }
          echo "Smoke test passed"

      - name: Show container logs on failure
        if: failure()
        run: docker logs frontend-test

      - name: Cleanup
        if: always()
        run: docker rm -f frontend-test || true

  # ──────────────────────────────────────────────
  # JOB 3: Build & push Docker image
  # Only on push to main (not on PRs)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: [lint, docker-smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag (short SHA)
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 4: Update Helm values → ArgoCD picks it up
  # ──────────────────────────────────────────────
  update-helm:
    name: Update Helm Values
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq (YAML editor)
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump frontend image tag in values.yaml
        run: |
          yq e '.frontend.image.tag = "${{ needs.build-and-push.outputs.image_tag }}"' \
            -i app/helm/sre-platform/values.yaml

      - name: Commit and push (triggers ArgoCD sync)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/helm/sre-platform/values.yaml
          git diff --staged --quiet || \
            git commit -m "chore(helm): bump frontend → ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push
