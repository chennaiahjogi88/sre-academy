apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          env:
            # Accept traces over OTLP (what OpenTelemetry SDKs send)
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            # In-memory store — fine for class demos; use Elasticsearch for production
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            - name: MEMORY_MAX_TRACES
              value: "10000"
          ports:
            - name: ui
              containerPort: 16686   # Jaeger UI
            - name: otlp-grpc
              containerPort: 4317    # OTLP gRPC (OpenTelemetry)
            - name: otlp-http
              containerPort: 4318    # OTLP HTTP (OpenTelemetry)
            - name: jaeger-thrift
              containerPort: 14268   # Jaeger HTTP thrift (legacy clients)
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-service
  namespace: monitoring
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: jaeger-thrift
      port: 14268
      targetPort: 14268
