name: CI

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: kotidevops/kt-backend
  FRONTEND_IMAGE: kotidevops/kt-frontend

jobs:
  # Run backend unit tests before spending time on Docker builds
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/backend

      - name: Run tests
        run: npm test
        working-directory: app/backend

  # Build each platform on a native runner — no QEMU emulation
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            platform: linux/amd64
            runner: ubuntu-latest
          - image: backend
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: frontend
            platform: linux/amd64
            runner: ubuntu-latest
          - image: frontend
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: img
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=${{ env.BACKEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.FRONTEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ steps.img.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform digests into a single multi-arch manifest
  merge:
    name: Merge ${{ matrix.image }} manifests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        image: [backend, frontend]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: img
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=${{ env.BACKEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.FRONTEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push multi-arch manifest
        run: |
          TAG="v${{ github.run_number }}"
          docker buildx imagetools create \
            --tag ${{ steps.img.outputs.name }}:${TAG} \
            $(printf '${{ steps.img.outputs.name }}@sha256:%s ' $(ls /tmp/digests))

  # Update image tags in values.yaml so ArgoCD picks up the new build
  update-image-tag:
    name: Update image tags in values files
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump backend and frontend tags
        run: |
          TAG="v${{ github.run_number }}"
          sed -i "s/^\(\s*tag:\s*\)v[0-9]*/\1${TAG}/" app/helm/sre-platform/values.yaml

      - name: Commit and push
        run: |
          TAG="v${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/helm/sre-platform/values.yaml
          git commit -m "chore: bump sre-platform image tags to ${TAG} [skip ci]"
          git push origin main

  # Confirm each published image carries both amd64 and arm64
  verify:
    name: Verify ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: merge
    strategy:
      matrix:
        image: [backend, frontend]

    steps:
      - name: Set image name
        id: img
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=${{ env.BACKEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.FRONTEND_IMAGE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify both architectures are present
        run: |
          TAG="v${{ github.run_number }}"
          IMAGE="${{ steps.img.outputs.name }}:${TAG}"
          echo "Inspecting $IMAGE"
          INSPECT=$(docker buildx imagetools inspect "$IMAGE")
          echo "$INSPECT"
          echo "$INSPECT" | grep -q "linux/amd64" || { echo "ERROR: linux/amd64 missing"; exit 1; }
          echo "$INSPECT" | grep -q "linux/arm64" || { echo "ERROR: linux/arm64 missing"; exit 1; }
          echo "Both platforms confirmed in manifest."
