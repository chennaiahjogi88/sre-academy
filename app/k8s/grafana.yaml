# ── MOVED ────────────────────────────────────────────────────────────────────
# Grafana has been moved to the dedicated monitoring namespace.
# See: k8s/monitoring/grafana.yaml
#
# This file is intentionally left as a placeholder so existing references
# to it do not cause errors. The deploy scripts no longer apply it.
# ─────────────────────────────────────────────────────────────────────────────
# --- placeholder ---
# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   name: grafana
#   namespace: sre-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sre-platform-secrets
                  key: GRAFANA_PASSWORD
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: sre-platform
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
