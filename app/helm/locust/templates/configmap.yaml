apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust.labels" . | nindent 4 }}
data:
  locustfile.py: |
    from locust import HttpUser, task, between
    import random
    import string

    CLASS_IDS = [
        "sre_foundations_1", "sre_foundations_2", "docker_fundamentals",
        "k8s_basics", "k8s_architecture", "prometheus", "grafana", "loki",
    ]

    def _random_email():
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=8))
        return f"loadtest_{suffix}@ktech.sre"

    class SREPlatformUser(HttpUser):
        wait_time = between(1, 3)
        token = None

        def on_start(self):
            resp = self.client.post(
                "/api/auth/login",
                json={"email": "student@ktech.sre", "password": "Student@123"},
                name="POST /api/auth/login",
            )
            if resp.status_code == 200:
                self.token = resp.json().get("token")

        def _headers(self):
            return {"Authorization": f"Bearer {self.token}"} if self.token else {}

        @task(6)
        def get_health(self):
            self.client.get("/health", name="GET /health")

        @task(5)
        def browse_classes(self):
            self.client.get("/api/classes", headers=self._headers(), name="GET /api/classes")

        @task(3)
        def view_announcements(self):
            self.client.get("/api/announcements", headers=self._headers(), name="GET /api/announcements")

        @task(2)
        def list_recordings(self):
            self.client.get("/api/recordings", headers=self._headers(), name="GET /api/recordings")

        @task(2)
        def update_progress(self):
            class_id = random.choice(CLASS_IDS)
            slide = random.randint(1, 19)
            self.client.put(
                f"/api/classes/{class_id}/progress",
                json={"current_slide": slide, "total_slides": 20, "completed": slide == 19},
                headers=self._headers(),
                name="PUT /api/classes/:id/progress",
            )

        @task(1)
        def auth_me(self):
            self.client.get("/api/auth/me", headers=self._headers(), name="GET /api/auth/me")
