name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'
      - 'app/frontend/**'

permissions:
  contents: read

env:
  BACKEND_IMAGE: kotidevops/kt-backend
  FRONTEND_IMAGE: kotidevops/kt-frontend

jobs:
  # Detect which service(s) actually changed so we skip unnecessary builds
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check changed paths
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^app/backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^app/frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # Run backend unit tests before spending time on Docker builds
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/backend

      - name: Run tests
        run: npm test
        working-directory: app/backend

  # Build backend on each native runner — no QEMU emulation
  build-backend:
    name: Build backend (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true' && needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.BACKEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-backend-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Build frontend on each native runner — no QEMU emulation
  build-frontend:
    name: Build frontend (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.FRONTEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-frontend-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform digests into a single multi-arch manifest
  merge-backend:
    name: Merge backend manifests
    runs-on: ubuntu-latest
    needs: [changes, build-backend]
    if: needs.changes.outputs.backend == 'true' && needs.build-backend.result == 'success'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-backend-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          TAG="v${{ github.run_number }}"
          docker buildx imagetools create \
            --tag ${{ env.BACKEND_IMAGE }}:${TAG} \
            $(printf '${{ env.BACKEND_IMAGE }}@sha256:%s ' $(ls /tmp/digests))

  merge-frontend:
    name: Merge frontend manifests
    runs-on: ubuntu-latest
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true' && needs.build-frontend.result == 'success'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-frontend-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          TAG="v${{ github.run_number }}"
          docker buildx imagetools create \
            --tag ${{ env.FRONTEND_IMAGE }}:${TAG} \
            $(printf '${{ env.FRONTEND_IMAGE }}@sha256:%s ' $(ls /tmp/digests))

  # Update only the image tag(s) that were actually rebuilt
  update-image-tag:
    name: Update image tags in values files
    runs-on: ubuntu-latest
    needs: [changes, merge-backend, merge-frontend]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.merge-backend.result == 'success' || needs.merge-backend.result == 'skipped') &&
      (needs.merge-frontend.result == 'success' || needs.merge-frontend.result == 'skipped') &&
      (needs.merge-backend.result == 'success' || needs.merge-frontend.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Bump changed image tags
        run: |
          TAG="v${{ github.run_number }}"
          VALUES=app/helm/sre-platform/values.yaml
          if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            sed -i "/^backend:/,/^[a-z]/ s/^\(\s*tag:\s*\)v[0-9]*/\1${TAG}/" "$VALUES"
          fi
          if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            sed -i "/^frontend:/,/^[a-z]/ s/^\(\s*tag:\s*\)v[0-9]*/\1${TAG}/" "$VALUES"
          fi

      - name: Commit and push
        run: |
          TAG="v${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/helm/sre-platform/values.yaml
          git commit -m "chore: bump sre-platform image tags to ${TAG} [skip ci]"
          git push origin main

  # Confirm each published image carries both amd64 and arm64
  verify-backend:
    name: Verify backend manifest
    runs-on: ubuntu-latest
    needs: [changes, merge-backend]
    if: needs.changes.outputs.backend == 'true' && needs.merge-backend.result == 'success'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify both architectures are present
        run: |
          TAG="v${{ github.run_number }}"
          IMAGE="${{ env.BACKEND_IMAGE }}:${TAG}"
          echo "Inspecting $IMAGE"
          INSPECT=$(docker buildx imagetools inspect "$IMAGE")
          echo "$INSPECT"
          echo "$INSPECT" | grep -q "linux/amd64" || { echo "ERROR: linux/amd64 missing"; exit 1; }
          echo "$INSPECT" | grep -q "linux/arm64" || { echo "ERROR: linux/arm64 missing"; exit 1; }
          echo "Both platforms confirmed in manifest."

  verify-frontend:
    name: Verify frontend manifest
    runs-on: ubuntu-latest
    needs: [changes, merge-frontend]
    if: needs.changes.outputs.frontend == 'true' && needs.merge-frontend.result == 'success'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify both architectures are present
        run: |
          TAG="v${{ github.run_number }}"
          IMAGE="${{ env.FRONTEND_IMAGE }}:${TAG}"
          echo "Inspecting $IMAGE"
          INSPECT=$(docker buildx imagetools inspect "$IMAGE")
          echo "$INSPECT"
          echo "$INSPECT" | grep -q "linux/amd64" || { echo "ERROR: linux/amd64 missing"; exit 1; }
          echo "$INSPECT" | grep -q "linux/arm64" || { echo "ERROR: linux/arm64 missing"; exit 1; }
          echo "Both platforms confirmed in manifest."
