apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust.labels" . | nindent 4 }}
data:
  locustfile.py: |
    from locust import HttpUser, task, between

    class SREPlatformUser(HttpUser):
        wait_time = between(1, 3)

        @task(3)
        def get_health(self):
            self.client.get("/health")

        @task(2)
        def get_api(self):
            self.client.get("/api/incidents")

        @task(1)
        def post_incident(self):
            self.client.post("/api/incidents", json={
                "title": "Load test incident",
                "severity": "low",
                "description": "Generated by Locust"
            })
