apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: {{ .Release.Namespace }}
  labels:
    app: mailhog
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: {{ .Values.mailhog.image }}
          ports:
            - containerPort: 1025
            - containerPort: 8025
          resources:
            {{- toYaml .Values.mailhog.resources | nindent 12 }}
