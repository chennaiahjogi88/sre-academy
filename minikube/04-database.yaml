# ============================================================
# STATEFULSET — For stateful workloads (databases, queues)
# ============================================================
# StatefulSet vs Deployment:
#   - Pods get STABLE, predictable names: postgres-0, postgres-1
#   - Pods start/stop in ORDER (postgres-0 before postgres-1)
#   - Each pod can get its own PVC via volumeClaimTemplates
#   - Pods get a stable DNS name via Headless Service:
#       postgres-0.postgres-headless.ktech-demo.svc.cluster.local
#
# Use StatefulSet for: databases, Kafka, Zookeeper, Elasticsearch

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ktech-demo
  labels:
    app: postgres
    tier: database
spec:
  serviceName: postgres-headless   # MUST match the Headless Service below
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      # ---- Security Context (runs as non-root) ----
      securityContext:
        fsGroup: 999               # postgres group owns mounted volumes
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:       # pull from ConfigMap
                  name: app-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:          # pull from Secret
                  name: app-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # ---- Liveness Probe — restart if postgres is hung ----
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "demouser", "-d", "demodb"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          # ---- Readiness Probe — only send traffic when ready ----
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "demouser", "-d", "demodb"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  # ---- volumeClaimTemplates (StatefulSet-specific) ----
  # Each pod replica gets its OWN PVC automatically.
  # postgres-0 → postgres-data-postgres-0
  # postgres-1 → postgres-data-postgres-1
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi

---
# ============================================================
# HEADLESS SERVICE — For StatefulSet stable DNS
# ============================================================
# clusterIP: None makes it "headless" — DNS resolves to individual
# pod IPs instead of a single virtual IP.
# Used internally by StatefulSet for pod-to-pod discovery.
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: ktech-demo
  labels:
    app: postgres
spec:
  clusterIP: None              # <-- HEADLESS: no virtual IP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres

---
# ============================================================
# CLUSTER IP SERVICE — Internal load-balanced access
# ============================================================
# Regular ClusterIP service for the app to connect to postgres.
# DNS: postgres-service.ktech-demo.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ktech-demo
  labels:
    app: postgres
spec:
  type: ClusterIP              # only reachable inside the cluster
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
