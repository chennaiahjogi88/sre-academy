apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-platform-config
  namespace: sre-platform
data:
  NODE_ENV: "production"
  PORT: "3001"
  PGHOST: "postgres-service"
  PGPORT: "5432"
  PGDATABASE: "sre_platform"
  PGUSER: "sre_user"
  UPLOAD_DIR: "/app/uploads"
  MAX_FILE_SIZE_MB: "500"
