apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: locust
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ktech-sre-academy
  annotations:
    # Wave 2 — depends on ingress-nginx (wave 1)
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: ktech-sre
  source:
    repoURL: https://github.com/myproject-vs/ktech-sre-academy.git
    targetRevision: main
    path: app/helm/locust
    helm:
      valueFiles:
        - values.yaml
        # targetHost uses cluster-internal DNS — no EKS override needed
        # ingress.host (locust.ktech.io) — point Route53 CNAME to the NLB DNS name
  destination:
    server: https://kubernetes.default.svc
    namespace: locust
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
