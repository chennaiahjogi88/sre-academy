apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ktech-sre-academy
  annotations:
    # Wave 1 — nginx must be ready before app/monitoring/locust ingresses work
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: ktech-sre
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.10.1"
    helm:
      values: |
        controller:
          service:
            type: LoadBalancer
          metrics:
            enabled: true
          config:
            use-forwarded-headers: "true"
            proxy-body-size: "512m"
            proxy-read-timeout: "600"
            proxy-send-timeout: "600"
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
