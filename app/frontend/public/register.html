<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Ktech SRE Training</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #060d1a 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .card {
            background: #0a1628;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
            text-align: left;
        }

        .logo-text .brand-main {
            font-size: 28px;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .logo-text .brand-sub {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .btn-register {
            width: 100%;
            padding: 12px 16px;
            background: #38bdf8;
            color: #0a1628;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        .btn-register:hover:not(:disabled) {
            background: #0ea5e9;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
            transform: translateY(-1px);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-register.loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-left: 8px;
            border: 2px solid rgba(10, 22, 40, 0.3);
            border-top-color: #0a1628;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: -2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 12px 14px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid #4ade80;
            border-radius: 8px;
            padding: 12px 14px;
            color: #86efac;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .link-group {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #1e293b;
            text-align: center;
            font-size: 13px;
        }

        .link-group a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .link-group a:hover {
            color: #0ea5e9;
            text-decoration: underline;
        }

        .password-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
            line-height: 1.5;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint-check {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 1px solid #475569;
            border-radius: 3px;
            text-align: center;
            line-height: 12px;
            font-size: 10px;
            color: #4ade80;
        }

        .hint-check.valid {
            background: #4ade80;
            border-color: #4ade80;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .card {
                padding: 28px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
                        <line x1="18" y1="10" x2="18" y2="26" stroke="#1e293b" stroke-width="1"/>
                        <line x1="10" y1="18" x2="26" y2="18" stroke="#1e293b" stroke-width="1"/>
                        <line x1="13" y1="11" x2="13" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="13" y1="18" x2="23" y2="11" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <line x1="13" y1="18" x2="23" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                        <circle cx="28" cy="10" r="2.5" fill="#38bdf8" opacity="0.6"/>
                    </svg>
                    <span class="logo-text">
                        <span class="brand-main">Ktech</span>
                        <span class="brand-sub">SRE Academy</span>
                    </span>
                </div>
                <div class="subtitle">Create Account</div>
            </div>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Your full name"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        oninput="validatePassword()"
                    />
                    <div class="password-hint">
                        <div class="hint-item">
                            <span class="hint-check" id="check1">✓</span>
                            <span>At least 8 characters</span>
                        </div>
                        <div class="hint-item">
                            <span class="hint-check" id="check2">✓</span>
                            <span>Uppercase and lowercase</span>
                        </div>
                        <div class="hint-item">
                            <span class="hint-check" id="check3">✓</span>
                            <span>A number</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    Create Account
                </button>
            </form>

            <div class="link-group">
                Already have an account? <a href="/login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        Auth.redirectIfLoggedIn();

        const form = document.getElementById('registerForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function validatePassword() {
            const pwd = passwordInput.value;

            const check1 = pwd.length >= 8;
            const check2 = /[a-z]/.test(pwd) && /[A-Z]/.test(pwd);
            const check3 = /\d/.test(pwd);

            document.getElementById('check1').classList.toggle('valid', check1);
            document.getElementById('check2').classList.toggle('valid', check2);
            document.getElementById('check3').classList.toggle('valid', check3);

            return check1 && check2 && check3;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Validate
            if (!nameInput.value.trim()) {
                errorMsg.textContent = 'Please enter your full name';
                errorMsg.classList.add('show');
                return;
            }

            if (!validatePassword()) {
                errorMsg.textContent = 'Password does not meet requirements';
                errorMsg.classList.add('show');
                return;
            }

            if (passwordInput.value !== confirmPasswordInput.value) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.add('show');
                confirmPasswordInput.focus();
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Creating Account';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nameInput.value.trim(),
                        email: emailInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store session
                    Auth.setSession(data.token, data.user);

                    // Show success
                    successMsg.textContent = `Welcome, ${data.user.name}!`;
                    successMsg.classList.add('show');

                    // Redirect after brief delay
                    setTimeout(() => {
                        window.location.href = '/portal.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Registration failed');
                }
            } catch (error) {
                errorMsg.textContent = error.message || 'An error occurred. Please try again.';
                errorMsg.classList.add('show');

                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Create Account';

                passwordInput.value = '';
                confirmPasswordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
