name: Backend CI

# Triggers on any change to backend code or this workflow file.
# On PR: test only. On push to main: test → build → push image → update Helm tag.
on:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: write   # needed to commit the Helm values update back to main

env:
  IMAGE_NAME: kotidevops/kt-backend

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Run tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - name: Install dependencies
        working-directory: app/backend
        run: npm ci

      - name: Run unit & integration tests
        working-directory: app/backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
          # Disable Node 22+ experimental Web Storage (localStorage) to avoid
          # a SecurityError in jest-environment-node on newer Node versions.
          NODE_OPTIONS: --no-experimental-webstorage

  # ──────────────────────────────────────────────
  # JOB 2: Build & push Docker image
  # Only on push to main (not on PRs)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag (short SHA)
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_NAME }}:latest
          # GitHub Actions cache keeps layer cache across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 3: Update Helm values → ArgoCD picks it up
  # ──────────────────────────────────────────────
  update-helm:
    name: Update Helm Values
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq (YAML editor)
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump backend image tag in values.yaml
        run: |
          yq e '.backend.image.tag = "${{ needs.build-and-push.outputs.image_tag }}"' \
            -i app/helm/sre-platform/values.yaml

      - name: Commit and push (triggers ArgoCD sync)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/helm/sre-platform/values.yaml
          # Only commit if values.yaml actually changed
          git diff --staged --quiet || \
            git commit -m "chore(helm): bump backend → ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push
