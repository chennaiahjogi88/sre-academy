<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordings — Ktech SRE Training</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #060d1a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(6, 13, 26, 0.98) 0%, rgba(6, 13, 26, 0.95) 100%);
            border-bottom: 1px solid #1e293b;
            backdrop-filter: blur(10px);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: #38bdf8;
            text-decoration: none;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .nav-logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .nav-logo-text .brand-main {
            font-size: 18px;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .nav-logo-text .brand-sub {
            font-size: 9px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 30px;
            flex: 1;
            margin-left: 60px;
        }

        .online-badge {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: #0a1628;
            border-radius: 6px;
            border: 1px solid #1e293b;
            font-size: 13px;
        }

        .role-badge {
            background: #38bdf8;
            color: #0a1628;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }

        .admin-badge {
            background: #f97316;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .nav-links a {
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: #1e293b;
            color: #38bdf8;
        }

        .nav-links a.active {
            color: #38bdf8;
            background: #1e293b;
        }

        .btn-logout {
            padding: 6px 14px;
            background: #f87171;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #ef4444;
        }

        /* Page Header */
        .page-header {
            padding: 40px;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            border-bottom: 1px solid #1e293b;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #e2e8f0;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        /* Filter & Upload Bar */
        .filter-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 240px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            margin-bottom: 8px;
            display: block;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            background: #0a1628;
            border: 1px solid #1e293b;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .btn-upload {
            padding: 10px 20px;
            background: #38bdf8;
            color: #0a1628;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            transition: all 0.2s;
            align-self: flex-end;
            white-space: nowrap;
        }

        .btn-upload:hover {
            background: #0ea5e9;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        /* Grid */
        .recordings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .recording-card {
            background: #0a1628;
            border: 1px solid #1e293b;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .recording-card:hover {
            border-color: #38bdf8;
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.15);
            transform: translateY(-4px);
        }

        .video-container {
            aspect-ratio: 16 / 9;
            background: #0f172a;
            position: relative;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(56, 189, 248, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .recording-card:hover .play-button {
            background: #38bdf8;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .recording-info {
            padding: 20px;
        }

        .recording-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
            line-height: 1.4;
        }

        .recording-class {
            font-size: 12px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .recording-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #1e293b;
            font-size: 12px;
            color: #64748b;
        }

        .recording-duration {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .recording-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #94a3b8;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #0a1628;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px dashed #38bdf8;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #38bdf8;
            font-size: 13px;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .file-name {
            margin-top: 8px;
            font-size: 12px;
            color: #4ade80;
        }

        .upload-progress {
            margin-top: 16px;
            display: none;
        }

        .upload-progress.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        .progress-text {
            font-size: 12px;
            color: #94a3b8;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #38bdf8;
            color: #0a1628;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0ea5e9;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #1e293b;
            color: #cbd5e1;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-modal:hover {
            color: #38bdf8;
        }

        .loading {
            text-align: center;
            padding: 60px 40px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #1e293b;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .container {
                padding: 40px 24px;
            }

            .recordings-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                height: auto;
                padding: 12px 16px;
                gap: 12px;
            }

            .nav-center {
                width: 100%;
                margin-left: 0;
                gap: 16px;
            }

            .nav-right {
                width: 100%;
                gap: 12px;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-group {
                min-width: unset;
            }

            .btn-upload {
                width: 100%;
                align-self: unset;
            }

            .recordings-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="/portal.html" class="nav-brand">
            <svg class="nav-logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5"/>
                <line x1="18" y1="10" x2="18" y2="26" stroke="#1e293b" stroke-width="1"/>
                <line x1="10" y1="18" x2="26" y2="18" stroke="#1e293b" stroke-width="1"/>
                <line x1="13" y1="11" x2="13" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="13" y1="18" x2="23" y2="11" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="13" y1="18" x2="23" y2="25" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"/>
                <circle cx="28" cy="10" r="2.5" fill="#38bdf8" opacity="0.6"/>
            </svg>
            <span class="nav-logo-text">
                <span class="brand-main">Ktech</span>
                <span class="brand-sub">SRE Academy</span>
            </span>
        </a>
        <div class="nav-center">
            <div class="online-badge"></div>
            <span id="activeUsers" style="font-size: 13px; color: #cbd5e1;">Loading...</span>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <span id="userName">User</span>
                <span class="role-badge" id="userRole">Student</span>
            </div>
            <div class="nav-links">
                <a href="/portal.html">Classes</a>
                <a href="/recordings.html" class="active">Recordings</a>
                <a id="adminLink" href="/admin.html" style="display: none;">Admin</a>
                <button class="btn-logout" onclick="Auth.logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">Class Recordings</h1>
        <p class="page-subtitle">Watch recorded sessions from your instructors</p>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter & Upload Bar -->
        <div class="filter-bar">
            <div class="filter-group" style="flex: 0 1 auto;">
                <label class="filter-label">Filter by Module</label>
                <select id="moduleFilter" onchange="filterRecordings()">
                    <option value="">All Modules</option>
                </select>
            </div>
            <div class="filter-group" style="flex: 0 1 auto;">
                <label class="filter-label">Filter by Class</label>
                <select id="classFilter" onchange="filterRecordings()">
                    <option value="">All Classes</option>
                </select>
            </div>
            <button class="btn-upload" id="uploadBtn" style="display: none;" onclick="openUploadModal()">
                + Upload Recording
            </button>
        </div>

        <!-- Recordings Grid -->
        <div id="recordingsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading recordings...</p>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeUploadModal()">×</button>
            <div class="modal-header">
                <div class="modal-title">Upload Recording</div>
                <div class="modal-subtitle">Add a new class recording</div>
            </div>

            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="form-group">
                    <label for="uploadClass">Class</label>
                    <select id="uploadClass" required>
                        <option value="">Select a class...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="uploadTitle">Recording Title</label>
                    <input
                        type="text"
                        id="uploadTitle"
                        placeholder="e.g., Live Session - Jan 15"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="uploadDescription">Description (optional)</label>
                    <textarea id="uploadDescription" placeholder="Add notes about this recording..."></textarea>
                </div>

                <div class="form-group">
                    <label>Video File</label>
                    <div class="file-input-wrapper">
                        <input
                            type="file"
                            id="uploadFile"
                            accept="video/*"
                            required
                            onchange="updateFileName()"
                        />
                        <label for="uploadFile" class="file-input-label">
                            Click to select video file or drag & drop
                        </label>
                        <div class="file-name" id="fileName"></div>
                    </div>
                </div>

                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="uploadProgressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text"><span id="uploadPercentage">0</span>%</div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeUploadModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitUploadBtn">
                        Upload
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/ws.js"></script>
    <script>
        // Require authentication
        if (!Auth.requireAuth()) {
            throw new Error('Redirecting to login...');
        }

        const user = Auth.getUser();
        document.getElementById('userName').textContent = user.name || 'User';
        document.getElementById('userRole').textContent = user.role.toUpperCase();

        // Show upload button and admin link if admin
        if (Auth.isAdmin()) {
            document.getElementById('uploadBtn').style.display = 'inline-block';
            document.getElementById('adminLink').style.display = 'block';
            document.getElementById('userRole').classList.add('admin-badge');
        }

        // Initialize WebSocket
        WS.init();

        WS.on('active_users', (data) => {
            document.getElementById('activeUsers').textContent = `${data.count} online`;
        });

        let allRecordings = [];
        let allClasses = [];

        // Load recordings
        async function loadRecordings() {
            try {
                const res = await Auth.fetch('/api/recordings');
                if (!res) return;

                const data = await res.json();
                allRecordings = Array.isArray(data) ? data : (data.data || []);

                // Load classes for filters
                const classRes = await Auth.fetch('/api/classes');
                if (!classRes) return;

                const classData = await classRes.json();
                allClasses = classData.classes || [];

                // Populate filters
                populateFilters();

                // Display recordings
                displayRecordings(allRecordings);
            } catch (error) {
                console.error('Error loading recordings:', error);
                document.getElementById('recordingsContainer').innerHTML = `
                    <div class="empty-state">
                        <p>Failed to load recordings.</p>
                    </div>
                `;
            }
        }

        function populateFilters() {
            const modules = [...new Set(allClasses.map(c => c.module))];
            const moduleSelect = document.getElementById('moduleFilter');
            const classSelect = document.getElementById('uploadClass');

            modules.forEach(module => {
                const option = document.createElement('option');
                option.value = module;
                option.textContent = module;
                moduleSelect.appendChild(option);
            });

            allClasses.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.id;
                option.textContent = `${cls.id}: ${cls.title}`;
                classSelect.appendChild(option);
            });
        }

        function displayRecordings(recordings) {
            if (recordings.length === 0) {
                document.getElementById('recordingsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎬</div>
                        <div class="empty-title">No Recordings Yet</div>
                        <div class="empty-text">Recorded sessions will appear here as they're uploaded by instructors.</div>
                    </div>
                `;
                return;
            }

            const html = recordings
                .map(rec => {
                    const cls = allClasses.find(c => c.id === rec.class_id);
                    const uploaded = new Date(rec.created_at).toLocaleDateString();
                    const duration = rec.duration ? `${Math.round(rec.duration / 60)}m` : 'N/A';

                    return `
                        <div class="recording-card">
                            <div class="video-container">
                                <video controls controlsList="nodownload" oncontextmenu="return false" preload="metadata">
                                    <source src="/api/recordings/stream/${rec.filename}?token=${Auth.getToken()}" type="video/mp4">
                                    Your browser does not support the video tag.
                                </video>
                                <div class="play-button">▶</div>
                            </div>
                            <div class="recording-info">
                                <div class="recording-class">${cls ? cls.module : 'Unknown'}</div>
                                <div class="recording-title">${rec.title}</div>
                                <div class="recording-meta">
                                    <div class="recording-duration">
                                        <span>⏱️</span>
                                        <span>${duration}</span>
                                    </div>
                                    <div class="recording-date">
                                        <span>📅</span>
                                        <span>${uploaded}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                })
                .join('');

            document.getElementById('recordingsContainer').innerHTML = `
                <div class="recordings-grid">${html}</div>
            `;
        }

        function filterRecordings() {
            const moduleFilter = document.getElementById('moduleFilter').value;
            const classFilter = document.getElementById('classFilter').value;

            let filtered = allRecordings;

            if (moduleFilter) {
                const cls = allClasses.filter(c => c.module === moduleFilter).map(c => c.id);
                filtered = filtered.filter(r => cls.includes(r.class_id));
            }

            if (classFilter) {
                filtered = filtered.filter(r => r.class_id === classFilter);
            }

            displayRecordings(filtered);
        }

        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('show');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('show');
            document.getElementById('uploadForm').reset();
            document.getElementById('uploadProgress').classList.remove('show');
        }

        function updateFileName() {
            const file = document.getElementById('uploadFile').files[0];
            if (file) {
                document.getElementById('fileName').textContent = `Selected: ${file.name}`;
            }
        }

        async function handleUpload(e) {
            e.preventDefault();

            const classId = document.getElementById('uploadClass').value;
            const title = document.getElementById('uploadTitle').value;
            const description = document.getElementById('uploadDescription').value;
            const file = document.getElementById('uploadFile').files[0];

            if (!classId || !title || !file) {
                alert('Please fill in all required fields.');
                return;
            }

            const formData = new FormData();
            formData.append('class_id', classId);
            formData.append('title', title);
            formData.append('description', description);
            formData.append('recording', file);

            const token = Auth.getToken();
            const headers = { 'Authorization': `Bearer ${token}` };

            try {
                document.getElementById('uploadProgress').classList.add('show');
                document.getElementById('submitUploadBtn').disabled = true;

                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('uploadProgressFill').style.width = percent + '%';
                        document.getElementById('uploadPercentage').textContent = percent;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 201 || xhr.status === 200) {
                        alert('Recording uploaded successfully!');
                        closeUploadModal();
                        loadRecordings();
                    } else {
                        alert('Upload failed. Please try again.');
                    }
                    document.getElementById('submitUploadBtn').disabled = false;
                });

                xhr.addEventListener('error', () => {
                    alert('Upload error. Please try again.');
                    document.getElementById('submitUploadBtn').disabled = false;
                });

                xhr.open('POST', '/api/recordings/upload');
                xhr.setRequestHeader('Authorization', `Bearer ${token}`);
                xhr.send(formData);
            } catch (error) {
                console.error('Upload error:', error);
                alert('Upload failed.');
                document.getElementById('submitUploadBtn').disabled = false;
            }
        }

        // Load on mount
        loadRecordings();
    </script>
</body>
</html>
