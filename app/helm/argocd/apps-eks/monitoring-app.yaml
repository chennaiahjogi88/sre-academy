apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ktech-sre-academy
  annotations:
    # Wave 2 — depends on ingress-nginx (wave 1)
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: ktech-sre
  source:
    repoURL: https://github.com/myproject-vs/ktech-sre-academy.git
    targetRevision: helm
    path: app/helm/monitoring
    helm:
      valueFiles:
        - values.yaml
        # EKS overlay — update alertmanager.externalUrl and Slack webhook here if needed
        - values-eks.yaml
      # Override Slack webhook at deploy time:
      # parameters:
      #   - name: alertmanager.slackWebhookUrl
      #     value: <your-webhook-url>
      #   - name: grafana.adminPassword
      #     value: <your-grafana-password>
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
