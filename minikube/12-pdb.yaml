# ============================================================
# POD DISRUPTION BUDGET (PDB)
# ============================================================
# A PDB limits voluntary disruptions to your pods.
# "Voluntary disruptions" = planned operations like:
#   - Node drain (kubectl drain node)
#   - Rolling updates
#   - Cluster upgrades
#   - Node auto-scaling down
#
# PDB does NOT protect against involuntary disruptions like:
#   - Hardware failures
#   - OOM kills
#   - Node crashes
#
# Two ways to configure:
#   minAvailable:     minimum pods that must remain running
#   maxUnavailable:   maximum pods that can be unavailable
#
# Real-world example:
#   Deployment has 3 replicas, PDB says minAvailable: 2
#   → K8s will only drain 1 node at a time (keeps 2 pods running)

# ---- PDB for demo-app ----
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-app-pdb
  namespace: ktech-demo
  labels:
    app: demo-app
spec:
  minAvailable: 1           # at least 1 pod must be running during disruptions
  # maxUnavailable: 1       # alternative: at most 1 pod can be down
  selector:
    matchLabels:
      app: demo-app

---
# ---- PDB for postgres (StatefulSet) ----
# Single-replica postgres — PDB set to 0 maxUnavailable means
# Kubernetes won't drain the node postgres runs on unless forced.
# This prevents accidental data loss in lab.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: ktech-demo
  labels:
    app: postgres
spec:
  maxUnavailable: 0         # zero tolerance — postgres must not be disrupted voluntarily
  selector:
    matchLabels:
      app: postgres
