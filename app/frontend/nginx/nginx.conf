worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    client_max_body_size 600M;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── API proxy to backend ──
        location /api/ {
            proxy_pass http://backend-service:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── Socket.io WebSocket proxy ──
        location /socket.io/ {
            proxy_pass http://backend-service:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # ── Prometheus metrics proxy (internal) ──
        location /backend-metrics {
            proxy_pass http://backend-service:3001/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Static HTML pages ──
        location / {
            try_files $uri $uri/ $uri.html /index.html;
            add_header Cache-Control "no-cache";
        }

        # ── PPT slides ──
        location /ppts/ {
            alias /usr/share/nginx/html/ppts/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri $uri/ =404;
        }

        # ── Downloadable files (PPTX, PDFs, etc.) ──
        location /files/ {
            alias /usr/share/nginx/html/files/;
            add_header Cache-Control "public, max-age=86400";
            add_header Content-Disposition "attachment";
            try_files $uri =404;
        }

        # ── Video streaming passthrough ──
        location /api/recordings/stream/ {
            proxy_pass http://backend-service:3001;
            proxy_http_version 1.1;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        # ── Health ──
        location /nginx-health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ── Security headers ──
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
    }
}
